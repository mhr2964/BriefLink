openapi: 3.1.0
info:
  title: BriefLink API
  version: 1.0.0-mvp1
  summary: Locked MVP 1 backend contract for submission intake and brief retrieval
  description: |
    Canonical MVP 1 backend contract for BriefLink.

    Scope is intentionally limited to two versioned endpoints:
    - POST /api/v1/submissions
    - GET /api/v1/status

    Contract rules:
    - All responses use a predictable JSON envelope.
    - Authentication uses Bearer tokens.
    - No additional endpoints are defined in MVP 1.
    - Some implementation details are intentionally locked as unknowns and documented with
      placeholder-friendly fields rather than invented behavior.
servers:
  - url: https://api.brieflink.example
    description: Placeholder production base URL
security:
  - bearerAuth: []
tags:
  - name: submissions
    description: Submission intake
  - name: status
    description: Authenticated brief retrieval and processing status
paths:
  /api/v1/submissions:
    post:
      tags:
        - submissions
      operationId: createSubmission
      summary: Create a submission for brief generation
      description: |
        Accepts an account submission payload and creates a processing job.

        The authenticated caller submits source details for a target account. The backend
        validates the request, stores the submission, and starts or queues account-brief
        generation.

        Locked unknowns:
        - The exact asynchronous processing backend is not specified in MVP 1.
        - Whether duplicate submissions are deduplicated or accepted as new jobs is not
          specified in MVP 1.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionCreateRequest'
            examples:
              minimal:
                summary: Minimal valid submission
                value:
                  account_name: Acme Corp
              with_optional_fields:
                summary: Submission with additional source context
                value:
                  account_name: Acme Corp
                  website_url: https://acme.example
                  linkedin_url: https://www.linkedin.com/company/acme
                  notes: Interested in procurement modernization
      responses:
        '202':
          description: Submission accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionAcceptedEnvelope'
              examples:
                accepted:
                  value:
                    success: true
                    data:
                      submission_id: sub_01JABCXYZ1234567890
                      status: queued
                      message: Submission accepted for processing.
                    error: null
                    meta:
                      request_id: req_01JABCXYZ1234567890
                      api_version: v1
                      timestamp: '2026-04-29T00:00:00Z'
        '400':
          description: Request body failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                validation_error:
                  value:
                    success: false
                    data: null
                    error:
                      code: validation_error
                      message: Request validation failed.
                      details:
                        field_errors:
                          account_name:
                            - account_name is required
                    meta:
                      request_id: req_01JABCXYZ1234567890
                      api_version: v1
                      timestamp: '2026-04-29T00:00:00Z'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unauthorized:
                  value:
                    success: false
                    data: null
                    error:
                      code: unauthorized
                      message: Authentication required.
                      details: null
                    meta:
                      request_id: req_01JABCXYZ1234567890
                      api_version: v1
                      timestamp: '2026-04-29T00:00:00Z'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                rate_limited:
                  value:
                    success: false
                    data: null
                    error:
                      code: rate_limited
                      message: Too many requests.
                      details: null
                    meta:
                      request_id: req_01JABCXYZ1234567890
                      api_version: v1
                      timestamp: '2026-04-29T00:00:00Z'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/status:
    get:
      tags:
        - status
      operationId: getSubmissionStatus
      summary: Get processing status and brief artifact for a submission
      description: |
        Returns the current processing status for a previously accepted submission and,
        when ready, the generated brief artifact.

        The submission to inspect is identified by query parameter. MVP 1 keeps retrieval
        on this single endpoint and does not define a separate detail route.

        Locked unknowns:
        - Polling cadence and client retry strategy are not specified in MVP 1.
        - Retention period for completed artifacts is not specified in MVP 1.
        - Partial progress percentages are not specified in MVP 1.
      parameters:
        - name: submission_id
          in: query
          required: true
          description: Submission identifier returned from POST /api/v1/submissions
          schema:
            type: string
            minLength: 1
            examples:
              - sub_01JABCXYZ1234567890
      responses:
        '200':
          description: Current status returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusEnvelope'
              examples:
                queued:
                  summary: Submission is queued
                  value:
                    success: true
                    data:
                      submission_id: sub_01JABCXYZ1234567890
                      status: queued
                      artifact: null
                    error: null
                    meta:
                      request_id: req_01JABCXYZ1234567891
                      api_version: v1
                      timestamp: '2026-04-29T00:00:05Z'
                processing:
                  summary: Submission is processing
                  value:
                    success: true
                    data:
                      submission_id: sub_01JABCXYZ1234567890
                      status: processing
                      artifact: null
                    error: null
                    meta:
                      request_id: req_01JABCXYZ1234567892
                      api_version: v1
                      timestamp: '2026-04-29T00:00:10Z'
                completed:
                  summary: Submission completed with artifact
                  value:
                    success: true
                    data:
                      submission_id: sub_01JABCXYZ1234567890
                      status: completed
                      artifact:
                        account_brief: Acme Corp is a mid-market software buyer with visible transformation signals and a likely operations modernization mandate.
                        risk_flags:
                          - No recent public funding signal found
                          - Procurement timeline unknown
                        prep_notes:
                          - Confirm current ERP footprint
                          - Ask about cross-functional decision makers
                    error: null
                    meta:
                      request_id: req_01JABCXYZ1234567893
                      api_version: v1
                      timestamp: '2026-04-29T00:01:00Z'
                failed:
                  summary: Submission failed
                  value:
                    success: true
                    data:
                      submission_id: sub_01JABCXYZ1234567890
                      status: failed
                      artifact: null
                    error: null
                    meta:
                      request_id: req_01JABCXYZ1234567894
                      api_version: v1
                      timestamp: '2026-04-29T00:01:15Z'
        '400':
          description: Missing or invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missing_submission_id:
                  value:
                    success: false
                    data: null
                    error:
                      code: validation_error
                      message: Request validation failed.
                      details:
                        field_errors:
                          submission_id:
                            - submission_id is required
                    meta:
                      request_id: req_01JABCXYZ1234567895
                      api_version: v1
                      timestamp: '2026-04-29T00:00:00Z'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Submission not found or inaccessible to caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                not_found:
                  value:
                    success: false
                    data: null
                    error:
                      code: not_found
                      message: Submission not found.
                      details: null
                    meta:
                      request_id: req_01JABCXYZ1234567896
                      api_version: v1
                      timestamp: '2026-04-29T00:00:00Z'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ResponseMeta:
      type: object
      additionalProperties: false
      required:
        - request_id
        - api_version
        - timestamp
      properties:
        request_id:
          type: string
          description: Server-generated request correlation identifier
        api_version:
          type: string
          const: v1
        timestamp:
          type: string
          format: date-time
    ErrorObject:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - details
      properties:
        code:
          type: string
          enum:
            - validation_error
            - unauthorized
            - forbidden
            - not_found
            - rate_limited
            - conflict
            - internal_error
        message:
          type: string
        details:
          description: Optional structured error details
          nullable: true
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - success
        - data
        - error
        - meta
      properties:
        success:
          type: boolean
          const: false
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ErrorObject'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    SubmissionCreateRequest:
      type: object
      additionalProperties: false
      required:
        - account_name
      properties:
        account_name:
          type: string
          minLength: 1
          description: Human-readable target account name
        website_url:
          type: string
          format: uri
          description: Optional company website URL
        linkedin_url:
          type: string
          format: uri
          description: Optional company LinkedIn URL
        notes:
          type: string
          maxLength: 4000
          description: Optional freeform seller context
    SubmissionAcceptedData:
      type: object
      additionalProperties: false
      required:
        - submission_id
        - status
        - message
      properties:
        submission_id:
          type: string
        status:
          type: string
          enum:
            - queued
        message:
          type: string
    SubmissionAcceptedEnvelope:
      type: object
      additionalProperties: false
      required:
        - success
        - data
        - error
        - meta
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/SubmissionAcceptedData'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    BriefArtifact:
      type: object
      additionalProperties: false
      required:
        - account_brief
        - risk_flags
        - prep_notes
      properties:
        account_brief:
          type: string
          minLength: 1
          description: Generated account summary for seller preparation
        risk_flags:
          type: array
          description: Known risks, gaps, or uncertainties surfaced during generation
          items:
            type: string
        prep_notes:
          type: array
          description: Suggested call-prep or discovery prompts
          items:
            type: string
    SubmissionStatusData:
      type: object
      additionalProperties: false
      required:
        - submission_id
        - status
        - artifact
      properties:
        submission_id:
          type: string
        status:
          type: string
          enum:
            - queued
            - processing
            - completed
            - failed
        artifact:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/BriefArtifact'
          description: Present only when status is completed; otherwise null
    StatusEnvelope:
      type: object
      additionalProperties: false
      required:
        - success
        - data
        - error
        - meta
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/SubmissionStatusData'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/ResponseMeta'